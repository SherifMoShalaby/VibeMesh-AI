<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Vibemesh-AI — describe a part, get a parametric 3D-printable model." />
    <meta name="theme-color" content="#0d0e11" />
    <title>Vibemesh-AI — parametric CAD for 3D printing</title>
    <!-- Social link unfurls (OpenGraph + Twitter). og.png is a RELATIVE url so it resolves under both
         a root deploy and a GitHub Pages subpath (vite base is "./"). Regenerate via scripts/gen-og.mjs. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Vibemesh-AI" />
    <meta property="og:title" content="Vibemesh-AI — text & image to 3D-printable CAD" />
    <meta property="og:description" content="Describe a part in plain language (or drop a photo) and get a parametric OpenSCAD model, rendered live in the browser and exported print-ready." />
    <meta property="og:image" content="og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Vibemesh-AI — text & image to 3D-printable CAD" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Vibemesh-AI — text & image to 3D-printable CAD" />
    <meta name="twitter:description" content="Plain language in, parametric 3D-printable CAD out — rendered live in your browser." />
    <meta name="twitter:image" content="og.png" />
    <!-- Fonts are self-hosted (src/fonts.css → /fonts/*.woff2): no render-blocking Google CDN,
         no per-visitor IP leak to Google, works offline. -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
