version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Batch low-risk updates into a single PR to cut review noise.
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      # One PR for all GitHub Actions bumps — version-coupled actions (e.g. the
      # Pages trio configure/upload/deploy) must move together, not piecemeal.
      actions:
        patterns:
          - "*"
