name: Deploy static demo to GitHub Pages

# Publishes the in-browser app (examples, parameter sliders, openscad-wasm
# rendering, STL/3MF/SCAD export — all client-side) as a static site.
# AI generation needs the Express backend, which Pages cannot run; the app
# detects the missing backend at runtime and shows a "demo mode" notice.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        # Use `npm install`, not `npm ci`: platform + npm-version differences in
        # optional deps (the @emnapi wasm-fallback subtree pulled by the bundler's
        # native bindings) make a lock generated on one toolchain fail `npm ci`'s
        # strict check on another. `npm install` reconciles that gap and still
        # honors the committed lock.
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
