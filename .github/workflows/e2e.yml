name: e2e

on:
  push:
    branches: [main]
  pull_request:

# Browser end-to-end tests (Playwright/chromium). Drives the real app via the built-in
# examples — no AI key needed (keyless: the model-menu tests self-skip). Separate from the
# lint/test/build job so a browser/WASM hiccup is visible without blocking that gate.
jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright chromium (+ OS deps)
        run: npx playwright install --with-deps chromium

      - name: Run e2e
        # playwright.config webServer starts `npm run dev` (web :5173 + API :5175) itself in CI
        run: npm run test:e2e

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
