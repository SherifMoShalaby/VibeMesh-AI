name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        # Use `npm install`, not `npm ci`: platform + npm-version differences in
        # optional deps (the @emnapi wasm-fallback subtree pulled by the bundler's
        # native bindings) make a lock generated on one toolchain fail `npm ci`'s
        # strict check on another. `npm install` reconciles that gap and still
        # honors the committed lock.
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Test (zero-API client-seam unit net)
        run: npm run test:run

      - name: Build
        run: npm run build

      - name: Audit production dependencies
        # Fail only on a high/critical vuln in shipped (non-dev) deps. Dev-only
        # advisories (e.g. the esbuild dev-server CVE) are excluded by --omit=dev.
        run: npm audit --omit=dev --audit-level=high
