name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Audit production dependencies
        # Fail only on a high/critical vuln in shipped (non-dev) deps. Dev-only
        # advisories (e.g. the esbuild dev-server CVE) are excluded by --omit=dev.
        run: npm audit --omit=dev --audit-level=high
