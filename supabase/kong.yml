_format_version: '2.1'

# Kong acts as the single entry-point for local Supabase.
# SUPABASE_URL / VITE_SUPABASE_URL both point to Kong (:8000).
# Kong strips the prefix and forwards to the right service:
#   /auth/v1/*  →  GoTrue  (supabase-auth:9999)
#   /rest/v1/*  →  PostgREST (supabase-rest:3000)

services:
  - name: auth-v1
    url: http://supabase-auth:9999/
    routes:
      - name: auth-v1-all
        strip_path: true
        paths:
          - /auth/v1
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - HEAD
            - PUT
            - PATCH
            - POST
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Accept-Version
            - Authorization
            - Content-Length
            - Content-MD5
            - Content-Type
            - Date
            - apikey
            - X-Client-Info
          exposed_headers:
            - X-Auth-Token
          credentials: true
          max_age: 3600

  - name: rest-v1
    url: http://supabase-rest:3000/
    routes:
      - name: rest-v1-all
        strip_path: true
        paths:
          - /rest/v1
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - HEAD
            - PUT
            - PATCH
            - POST
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Accept-Version
            - Authorization
            - Content-Length
            - Content-MD5
            - Content-Type
            - Date
            - Prefer
            - Range
            - apikey
            - X-Client-Info
          exposed_headers:
            - Content-Range
          credentials: true
          max_age: 3600
